<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Toques Bot - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fuentes más limpias y profesionales */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            color: #cbd5e1; 
            background-color: #0f172a; /* Slate 900 oscuro */
            /* Cuadrícula sutil profesional */
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 24px 24px;
            margin: 0;
            overflow: hidden; 
        }

        /* TIPOGRAFÍA RETRO-TECH SÓLO PARA TÍTULOS Y DATOS */
        .tech-font {
            font-family: 'Space Mono', monospace;
        }

        /* BARRA SUPERIOR MINIMALISTA */
        .custom-titlebar {
            width: 100%;
            height: 45px; 
            background-color: #1e293b;
            border-bottom: 1px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            -webkit-app-region: drag; 
            user-select: none;
            z-index: 100;
        }

        .titlebar-text { 
            font-size: 14px; 
            letter-spacing: 1px; 
            color: #38bdf8;
            font-weight: bold;
        }

        .window-controls {
            display: flex;
            gap: 15px; 
            -webkit-app-region: no-drag; 
        }

        .win-btn {
            color: #94a3b8;
            background: none;
            border: none;
            font-size: 16px; 
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .win-btn:hover { color: #f8fafc; }
        .win-btn:active { transform: scale(0.90); } 
        .close-btn:hover { color: #ef4444; }

        /* PANELES DE CRISTAL OSCURO (GLASSMORPHISM SUTIL) */
        .pro-panel {
            background-color: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #334155; 
            border-top: 2px solid #38bdf8; /* Acento azul corporativo */
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
            padding: clamp(15px, 2vw, 30px);
        }

        .left-panel {
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Scrollbar limpia */
        .left-panel::-webkit-scrollbar { width: 6px; }
        .left-panel::-webkit-scrollbar-track { background: transparent; }
        .left-panel::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        /* INPUTS MODERNOS */
        .pro-input {
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            width: 100%;
            transition: all 0.3s;
        }

        .pro-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .crn-box { height: clamp(80px, 12vh, 150px); font-family: 'Space Mono', monospace; }
        .msg-box { height: clamp(80px, 12vh, 150px); }

        /* BOTONES PROFESIONALES */
        .pro-btn {
            background-color: transparent;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pro-btn:hover { background-color: #38bdf8; color: #0f172a; }
        
        .mascot-btn { background: none; border: none; cursor: pointer; outline: none; }

        .zorro-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(180px, 20vw, 350px);
            height: clamp(180px, 20vw, 350px);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .mascot-image {
            width: clamp(160px, 18vw, 300px);
            height: clamp(160px, 18vw, 300px);
            image-rendering: pixelated;
            position: relative;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .look-left { transform: translate(40px, -20px); }
        .look-right { transform: translate(-40px, -20px); }

        .jelly-effect { animation: jellySquish 0.6s ease-out; }

        @keyframes jellySquish {
            0% { scale: 1 1; }
            25% { scale: 1.15 0.85; } 
            50% { scale: 0.9 1.1; } 
            75% { scale: 1.02 0.98; } 
            100% { scale: 1 1; }      
        }

        .mascot-btn:active .mascot-image { transform: scale(0.95); }

        .is-attacking .mascot-image {
            animation: shake 0.5s infinite;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.6)); /* Brillo rojo más sutil */
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- BARRA SUPERIOR -->
    <div class="custom-titlebar tech-font">
        <span class="titlebar-text">ZKTeco Core :: Toques Automation v2.0</span>
        <div class="window-controls">
            <button class="win-btn" onclick="minApp()">—</button>
            <button class="win-btn" onclick="maxApp()">□</button>
            <button class="win-btn close-btn" onclick="closeApp()">✕</button>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-[95vw] w-full grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- PANEL IZQUIERDO: FORMULARIO -->
            <div class="md:col-span-2 pro-panel left-panel flex flex-col gap-5">
                <h2 class="tech-font text-lg text-white border-b border-slate-700 pb-2 mb-2">
                    <span class="text-sky-400">#</span> Configuración de Interacción CRM
                </h2>
                
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold tracking-wide text-slate-400 uppercase">1. Lista de CRNs a procesar</label>
                    <textarea id="crn-input" class="pro-input crn-box resize-none" placeholder="12345&#10;67890">12345
67890</textarea>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold tracking-wide text-slate-400 uppercase">2. Asunto <span class="text-sky-400">*</span></label>
                    <input type="text" id="asunto-input" class="pro-input" placeholder="Ej. Contacto de seguimiento...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-semibold tracking-wide text-slate-400 uppercase">Medio <span class="text-sky-400">*</span></label>
                        <select id="medio-input" class="pro-input cursor-pointer">
                            <option value="Whatsapp">Whatsapp</option>
                            <option value="Chat">Chat</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Twitter">Twitter</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-semibold tracking-wide text-slate-400 uppercase">Tipo <span class="text-sky-400">*</span></label>
                        <select id="tipo-input" class="pro-input cursor-pointer">
                            <option value="Seguimiento">Seguimiento</option>
                            <option value="Validación de datos">Validación de datos</option>
                            <option value="Asesoría">Asesoría</option>
                            <option value="Promoción">Promoción</option>
                            <option value="Invitación a evento">Invitación a evento</option>
                            <option value="Reactivación">Reactivación</option>
                            <option value="Reinscripción">Reinscripción</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-semibold tracking-wide text-slate-400 uppercase">Resultado <span class="text-sky-400">*</span></label>
                        <select id="resultado-input" class="pro-input cursor-pointer">
                            <option value="Contacto efectivo">Contacto efectivo</option>
                            <option value="No contesta">No contesta</option>
                            <option value="Número no existe">Número no existe</option>
                            <option value="Marcar más tarde">Marcar más tarde</option>
                            <option value="Número equivocado">Número equivocado</option>
                            <option value="La persona no se encuentra">La persona no se encuentra</option>
                            <option value="Contesta y cuelga">Contesta y cuelga</option>
                            <option value="Buzón de voz">Buzón de voz</option>
                            <option value="Número ocupado">Número ocupado</option>
                            <option value="Otro">Otro</option>
                            <option value="Enviado">Enviado</option>
                            <option value="No se pudo enviar">No se pudo enviar</option>
                            <option value="Recibido">Recibido</option>
                            <option value="Leído (visto)">Leído (visto)</option>
                            <option value="Contestado">Contestado</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold tracking-wide text-slate-400 uppercase">3. Descripción</label>
                    <textarea id="desc-input" class="pro-input msg-box resize-none" placeholder="Escribe los detalles de la interacción..."></textarea>
                </div>

                <div class="flex justify-between items-center mt-2 pt-4 border-t border-slate-700">
                    <button class="pro-btn border-slate-500 text-slate-400 hover:bg-slate-700 hover:text-white" onclick="clearFields()">Limpiar Todo</button>
                    <p class="tech-font text-xs text-sky-400">Sys.Date Auto-Inject: Active</p>
                </div>
            </div>

            <!-- PANEL DERECHO: ZORRO BOT -->
            <div class="flex flex-col items-center justify-center gap-6 pro-panel min-w-0 overflow-hidden">
                <div id="status-container" class="h-8 flex items-center justify-center">
                    <p id="status-text" class="tech-font text-sm text-center text-slate-300">Sistema inactivo. Esperando...</p>
                </div>

                <button id="attack-btn" class="mascot-btn" onclick="startAttack()">
                    <div class="zorro-container">
                        <img src="frente.png" alt="Zorro Bot" class="mascot-image" id="zorro-img">
                    </div>
                </button>
                
                <p class="text-sm text-slate-400 text-center">
                    Haz clic en el asistente para<br><span class="text-sky-400 font-semibold">INICIAR AUTOMATIZACIÓN</span>
                </p>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIRMACIÓN -->
    <div id="retro-modal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="pro-panel max-w-2xl w-full flex flex-col gap-4 p-8">
            <h2 class="tech-font text-sky-400 text-lg border-b border-slate-700 pb-2">>> Confirmar Carga de Datos</h2>
            <div id="modal-msg" class="tech-font text-sm text-slate-300 leading-relaxed w-full break-words bg-slate-900 p-4 rounded border border-slate-700"></div>
            
            <div class="flex gap-4 w-full mt-4">
                <button onclick="cancelarAtaque()" class="pro-btn w-full !border-red-500 !text-red-500 hover:!bg-red-500 hover:!text-white">Cancelar</button>
                <button onclick="confirmarAtaque()" class="pro-btn w-full !bg-sky-500 !text-slate-900 hover:!bg-sky-400">Iniciar Script (Playwright)</button>
            </div>
        </div>
    </div>

    <!-- EL JAVASCRIPT SE MANTIENE EXACTAMENTE IGUAL -->
    <script>
        const spritesZorro = {
            normal: "frente.png",
            miraIzq: "izquierda.png",
            miraDer: "derecha.png",
            atacando: "CARGANDO.png" 
        };

        const zorroElement = document.getElementById('zorro-img');
        let cicloInterval = null; 
        let currentPayload = null; 

        function triggerJelly() {
            zorroElement.classList.remove('jelly-effect');
            void zorroElement.offsetWidth; 
            zorroElement.classList.add('jelly-effect');
        }

        function runAnimationSequence() {
            if (zorroElement.src.includes(spritesZorro.atacando) && document.getElementById('attack-btn').classList.contains('is-attacking')) return;

            zorroElement.src = spritesZorro.miraIzq;
            zorroElement.classList.remove('look-right');
            zorroElement.classList.add('look-left');
            triggerJelly();

            setTimeout(() => {
                if (zorroElement.src.includes(spritesZorro.atacando)) return;
                zorroElement.src = spritesZorro.miraDer;
                zorroElement.classList.remove('look-left');
                zorroElement.classList.add('look-right');
                triggerJelly();
            }, 3000); 

            setTimeout(() => {
                if (zorroElement.src.includes(spritesZorro.atacando)) return;
                zorroElement.src = spritesZorro.normal;
                zorroElement.classList.remove('look-left', 'look-right');
            }, 6000); 
        }

        function iniciarCicloDeVida() {
            cicloInterval = setInterval(runAnimationSequence, 15000);
        }

        iniciarCicloDeVida();

        function clearFields() {
            document.getElementById('crn-input').value = '';
            document.getElementById('asunto-input').value = '';
            document.getElementById('desc-input').value = '';
            document.getElementById('medio-input').selectedIndex = 0;
            document.getElementById('tipo-input').selectedIndex = 0;
            document.getElementById('resultado-input').selectedIndex = 0;
            
            const statusText = document.getElementById('status-text');
            statusText.textContent = 'CAMPOS LIMPIOS';
            statusText.style.color = '#38bdf8';
            setTimeout(() => {
                statusText.textContent = 'Sistema inactivo. Esperando...';
                statusText.style.color = '#cbd5e1';
            }, 2000);
        }

        function closeApp() { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(JSON.stringify({ command: 'CloseApp' })); }
        function minApp() { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(JSON.stringify({ command: 'MinimizeApp' })); }
        function maxApp() { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(JSON.stringify({ command: 'MaximizeApp' })); }

        function showModal(mensaje) {
            document.getElementById('modal-msg').innerHTML = mensaje;
            document.getElementById('retro-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('retro-modal').classList.add('hidden'); }

        function startAttack() {
            const crns = document.getElementById('crn-input').value.trim();
            const asunto = document.getElementById('asunto-input').value.trim();
            const medio = document.getElementById('medio-input').value;
            const tipo = document.getElementById('tipo-input').value;
            const resultado = document.getElementById('resultado-input').value;
            const descripcion = document.getElementById('desc-input').value.trim();
            
            const statusText = document.getElementById('status-text');
            const mascotBtn = document.getElementById('attack-btn');

            if (!crns || !asunto) {
                statusText.textContent = '¡ERROR: FALTAN DATOS OBLIGATORIOS!';
                statusText.style.color = '#ef4444';
                setTimeout(() => { statusText.textContent = 'Sistema inactivo. Esperando...'; statusText.style.color = '#cbd5e1'; }, 2000);
                return;
            }

            clearInterval(cicloInterval);
            zorroElement.classList.remove('look-left', 'look-right');
            triggerJelly(); 

            mascotBtn.classList.add('is-attacking');
            zorroElement.src = spritesZorro.atacando;
            statusText.textContent = '>> PROCESANDO...';
            statusText.style.color = '#38bdf8'; 

            currentPayload = JSON.stringify({ 
                command: 'StartToques', 
                crns: crns, 
                asunto: asunto,
                medio: medio,
                tipo: tipo,
                resultado: resultado,
                descripcion: descripcion
            });

            setTimeout(() => {
                mascotBtn.classList.remove('is-attacking');
                zorroElement.src = spritesZorro.normal; 
                statusText.textContent = 'REQUIERE CONFIRMACIÓN';
                statusText.style.color = '#facc15'; 
                
                showModal(`
                    <span style="color:#94a3b8;">Asunto:</span> ${asunto}<br>
                    <span style="color:#94a3b8;">Configuración:</span> [${medio}] - [${tipo}] - [${resultado}]<br>
                    <span style="color:#94a3b8;">CRNs detectados:</span> ${crns.split('\n').length} alumnos.<br>
                `);
            }, 1000);
        }

        function confirmarAtaque() {
            closeModal();
            const statusText = document.getElementById('status-text');
            
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(currentPayload);
            }

            statusText.textContent = 'EJECUCIÓN INICIADA (PLAYWRIGHT)';
            statusText.style.color = '#4ade80'; 
            
            setTimeout(() => {
                statusText.textContent = 'Sistema inactivo. Esperando...';
                statusText.style.color = '#cbd5e1';
                iniciarCicloDeVida(); 
            }, 3000);
        }

        function cancelarAtaque() {
            closeModal();
            currentPayload = null; 
            const statusText = document.getElementById('status-text');
            
            statusText.textContent = 'OPERACIÓN ABORTADA';
            statusText.style.color = '#ef4444';
            
            setTimeout(() => {
                statusText.textContent = 'Sistema inactivo. Esperando...';
                statusText.style.color = '#cbd5e1';
                iniciarCicloDeVida(); 
            }, 3000);
        }
    </script>
</body>
</html>
