<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Toques Bot - Retro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', cursive;
            color: #450088; 
            background-color: #0b0c10;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px),
                radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            animation: backgroundStars 60s linear infinite;
            margin: 0;
            overflow: hidden; 
        }

        @keyframes backgroundStars {
            0% { background-position: 0 0, 40px 60px, 130px 270px, 70px 100px; }
            100% { background-position: -550px -550px, -310px -290px, -120px -280px, -80px -50px; }
        }

        .custom-titlebar {
            width: 100%;
            height: 55px; 
            background-color: rgba(11, 12, 16, 0.95);
            border-bottom: 2px solid #450088;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            -webkit-app-region: drag; 
            user-select: none;
            z-index: 100;
        }

        .titlebar-text { font-size: 16px; letter-spacing: 2px; }

        .window-controls {
            display: flex;
            gap: 25px; 
            -webkit-app-region: no-drag; 
        }

        .win-btn {
            color: #450088;
            background: none;
            border: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px; 
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .win-btn:hover { color: #fff; }
        .win-btn:active { transform: scale(0.85); } 
        .close-btn { color: #ff6b6b; }
        .close-btn:hover { color: #ff0000; }

        .arcade-panel {
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            border: clamp(4px, 0.5vw, 8px) solid #450088; 
            box-shadow: inset 0 0 20px rgba(69, 0, 136, 0.3), 0 0 15px rgba(69, 0, 136, 0.5); 
            padding: clamp(15px, 2vw, 30px);
        }

        .left-panel {
            max-height: 85vh;
            overflow-y: auto;
        }

        .left-panel::-webkit-scrollbar { width: 8px; }
        .left-panel::-webkit-scrollbar-track { background: #000; }
        .left-panel::-webkit-scrollbar-thumb { background: #450088; border-radius: 4px; }

        .fluid-title { font-size: clamp(14px, 2vw, 30px); }
        .fluid-label { font-size: clamp(8px, 1vw, 14px); }
        .fluid-small { font-size: clamp(8px, 0.8vw, 12px); }

        .retro-input {
            background-color: rgba(17, 17, 17, 0.8);
            border: clamp(2px, 0.3vw, 4px) solid #450088;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(10px, 1.2vw, 16px);
            padding: clamp(8px, 1vw, 15px);
            outline: none;
            width: 100%;
            transition: box-shadow 0.3s;
        }

        .retro-select {
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, #450088 50%), linear-gradient(135deg, #450088 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        .retro-select:focus {
            animation: retroPulse 1.5s infinite;
            border-color: #b533ff;
        }

        @keyframes retroPulse {
            0% { box-shadow: 0 0 5px rgba(181, 51, 255, 0.5); }
            50% { box-shadow: 0 0 15px rgba(181, 51, 255, 0.9); }
            100% { box-shadow: 0 0 5px rgba(181, 51, 255, 0.5); }
        }

        .crn-box { height: clamp(80px, 12vh, 200px); }
        .msg-box { height: clamp(80px, 12vh, 150px); }

        .retro-input:focus {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .retro-btn {
            background-color: transparent;
            color: #450088;
            border: clamp(2px, 0.3vw, 4px) solid #450088;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(10px, 1.2vw, 20px);
            padding: clamp(8px, 1vw, 15px) clamp(15px, 2vw, 30px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .retro-btn:hover { background-color: #450088; color: #fff; }
        .mascot-btn { background: none; border: none; cursor: pointer; outline: none; }

        .zorro-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(200px, 25vw, 450px);
            height: clamp(200px, 25vw, 450px);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(clamp(-15px, -2vw, -30px)); }
            100% { transform: translateY(0px); }
        }

        .mascot-image {
            width: clamp(180px, 22vw, 400px);
            height: clamp(180px, 22vw, 400px);
            image-rendering: pixelated;
            position: relative;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .look-left { transform: translate(clamp(50px, 6vw, 120px), clamp(-30px, -4vw, -70px)); }
        .look-right { transform: translate(clamp(-50px, -6vw, -120px), clamp(-30px, -4vw, -70px)); }

        .jelly-effect { animation: jellySquish 0.6s ease-out; }

        @keyframes jellySquish {
            0% { scale: 1 1; }
            25% { scale: 1.25 0.75; } 
            50% { scale: 0.85 1.15; } 
            75% { scale: 1.05 0.95; } 
            100% { scale: 1 1; }      
        }

        .mascot-btn:active .mascot-image { transform: scale(0.95); }

        .is-attacking .mascot-image {
            animation: shake 0.5s infinite;
            /* AQUÍ QUITÉ EL HUE-ROTATE, SOLO QUEDA EL BRILLO ROJO */
            filter: drop-shadow(0 0 20px #ff0000);
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -4px) rotate(-1deg); }
            20% { transform: translate(-6px, 0px) rotate(1deg); }
            30% { transform: translate(6px, 4px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            50% { transform: translate(-2px, 4px) rotate(-1deg); }
            60% { transform: translate(-6px, 2px) rotate(0deg); }
            70% { transform: translate(6px, 2px) rotate(-1deg); }
            80% { transform: translate(-2px, -2px) rotate(1deg); }
            90% { transform: translate(2px, 4px) rotate(0deg); }
            100% { transform: translate(2px, -4px) rotate(-1deg); }
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="custom-titlebar">
        <span class="titlebar-text text-[#60a5fa] uppercase">Toques Bot Terminal</span>
        <div class="window-controls">
            <button class="win-btn" onclick="minApp()">[_]</button>
            <button class="win-btn" onclick="maxApp()">[□]</button>
            <button class="win-btn close-btn" onclick="closeApp()">[X]</button>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-[95vw] w-full grid grid-cols-1 md:grid-cols-3 gap-6 xl:gap-10">
            
            <div class="md:col-span-2 arcade-panel left-panel flex flex-col gap-4">
                <h1 class="fluid-title text-center mb-2 uppercase tracking-widest text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">
                    CONFIG. INTERACCIÓN CRM
                </h1>
                
                <div class="flex flex-col gap-2">
                    <label class="fluid-label text-gray-400 uppercase">1. Lista de CRNs:</label>
                    <textarea id="crn-input" class="retro-input crn-box resize-none" placeholder="12345&#10;67890">12345
67890</textarea>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="fluid-label text-[#ff6b6b] uppercase">2. Asunto *</label>
                    <input type="text" id="asunto-input" class="retro-input" placeholder="Ej. Contacto de seguimiento...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="fluid-label text-[#ff6b6b] uppercase">Medio *</label>
                        <select id="medio-input" class="retro-input retro-select">
                            <option value="Whatsapp">Whatsapp</option>
                            <option value="Chat">Chat</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Twitter">Twitter</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="fluid-label text-[#ff6b6b] uppercase">Tipo *</label>
                        <select id="tipo-input" class="retro-input retro-select">
                            <option value="Seguimiento">Seguimiento</option>
                            <option value="Validación de datos">Validación de datos</option>
                            <option value="Asesoría">Asesoría</option>
                            <option value="Promoción">Promoción</option>
                            <option value="Invitación a evento">Invitación a evento</option>
                            <option value="Reactivación">Reactivación</option>
                            <option value="Reinscripción">Reinscripción</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="fluid-label text-[#ff6b6b] uppercase">Resultado *</label>
                        <select id="resultado-input" class="retro-input retro-select">
                            <option value="Contacto efectivo">Contacto efectivo</option>
                            <option value="No contesta">No contesta</option>
                            <option value="Número no existe">Número no existe</option>
                            <option value="Marcar más tarde">Marcar más tarde</option>
                            <option value="Número equivocado">Número equivocado</option>
                            <option value="La persona no se encuentra">La persona no se encuentra</option>
                            <option value="Contesta y cuelga">Contesta y cuelga</option>
                            <option value="Buzón de voz">Buzón de voz</option>
                            <option value="Número ocupado">Número ocupado</option>
                            <option value="Otro">Otro</option>
                            <option value="Enviado">Enviado</option>
                            <option value="No se pudo enviar">No se pudo enviar</option>
                            <option value="Recibido">Recibido</option>
                            <option value="Leído (visto)">Leído (visto)</option>
                            <option value="Contestado">Contestado</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="fluid-label text-gray-400 uppercase">3. Descripción:</label>
                    <textarea id="desc-input" class="retro-input msg-box resize-none" placeholder="Escribe los detalles aquí..."></textarea>
                </div>

                <div class="flex justify-between items-center mt-2">
                    <button class="retro-btn" onclick="clearFields()">Limpiar Todo</button>
                    <p class="fluid-small text-gray-500">Auto-Date: ENABLED</p>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center gap-6 arcade-panel min-w-0 overflow-hidden">
                <div id="status-container" class="h-12 flex items-center justify-center">
                    <p id="status-text" class="fluid-label text-center uppercase blink" style="color: #ff6b6b;">Esperando órdenes...</p>
                </div>

                <button id="attack-btn" class="mascot-btn" onclick="startAttack()">
                    <div class="zorro-container">
                        <img src="frente.png" alt="Zorro Bot" class="mascot-image" id="zorro-img">
                    </div>
                </button>
                
                <p class="fluid-small text-gray-400 text-center leading-loose">
                    Clickea al zorro para<br><span class="text-[#ff6b6b]">INICIAR CARGA EN CRM</span>
                </p>
            </div>
        </div>
    </div>

    <div id="retro-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="arcade-panel max-w-2xl w-full flex flex-col items-center gap-6 p-8">
            <h2 class="fluid-label text-[#60a5fa] text-center uppercase blink">>> CARGA DE DATOS LISTA</h2>
            <p id="modal-msg" class="fluid-small text-white text-left leading-loose w-full break-words"></p>
            
            <div class="flex gap-4 w-full mt-4">
                <button onclick="cancelarAtaque()" class="retro-btn w-full hover:bg-[#ff6b6b] hover:text-black hover:border-[#ff6b6b]">CANCELAR</button>
                <button onclick="confirmarAtaque()" class="retro-btn w-full hover:bg-[#60a5fa] hover:text-black hover:border-[#60a5fa]">INICIAR</button>
            </div>
        </div>
    </div>

    <script>
        const spritesZorro = {
            normal: "frente.png",
            miraIzq: "izquierda.png",
            miraDer: "derecha.png",
            /* AQUÍ CAMBIÉ EL NOMBRE A TU NUEVA IMAGEN */
            atacando: "cargando.png" 
        };

        const zorroElement = document.getElementById('zorro-img');
        let cicloInterval = null; 
        let currentPayload = null; 

        function triggerJelly() {
            zorroElement.classList.remove('jelly-effect');
            void zorroElement.offsetWidth; 
            zorroElement.classList.add('jelly-effect');
        }

        function runAnimationSequence() {
            if (zorroElement.src.includes(spritesZorro.atacando) && document.getElementById('attack-btn').classList.contains('is-attacking')) return;

            zorroElement.src = spritesZorro.miraIzq;
            zorroElement.classList.remove('look-right');
            zorroElement.classList.add('look-left');
            triggerJelly();

            setTimeout(() => {
                if (zorroElement.src.includes(spritesZorro.atacando)) return;
                zorroElement.src = spritesZorro.miraDer;
                zorroElement.classList.remove('look-left');
                zorroElement.classList.add('look-right');
                triggerJelly();
            }, 3000); 

            setTimeout(() => {
                if (zorroElement.src.includes(spritesZorro.atacando)) return;
                zorroElement.src = spritesZorro.normal;
                zorroElement.classList.remove('look-left', 'look-right');
            }, 6000); 
        }

        function iniciarCicloDeVida() {
            cicloInterval = setInterval(runAnimationSequence, 15000);
        }

        iniciarCicloDeVida();

        function clearFields() {
            document.getElementById('crn-input').value = '';
            document.getElementById('asunto-input').value = '';
            document.getElementById('desc-input').value = '';
            document.getElementById('medio-input').selectedIndex = 0;
            document.getElementById('tipo-input').selectedIndex = 0;
            document.getElementById('resultado-input').selectedIndex = 0;
            
            const statusText = document.getElementById('status-text');
            statusText.textContent = 'CAMPOS LIMPIOS';
            statusText.style.color = '#fff';
            setTimeout(() => {
                statusText.textContent = 'ESPERANDO ÓRDENES...';
                statusText.style.color = '#ff6b6b';
            }, 2000);
        }

        function closeApp() { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(JSON.stringify({ command: 'CloseApp' })); }
        function minApp() { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(JSON.stringify({ command: 'MinimizeApp' })); }
        function maxApp() { if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(JSON.stringify({ command: 'MaximizeApp' })); }

        function showModal(mensaje) {
            document.getElementById('modal-msg').innerHTML = mensaje;
            document.getElementById('retro-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('retro-modal').classList.add('hidden'); }

        function startAttack() {
            const crns = document.getElementById('crn-input').value.trim();
            const asunto = document.getElementById('asunto-input').value.trim();
            const medio = document.getElementById('medio-input').value;
            const tipo = document.getElementById('tipo-input').value;
            const resultado = document.getElementById('resultado-input').value;
            const descripcion = document.getElementById('desc-input').value.trim();
            
            const statusText = document.getElementById('status-text');
            const mascotBtn = document.getElementById('attack-btn');

            if (!crns || !asunto) {
                statusText.textContent = '¡FALTAN DATOS!';
                statusText.style.color = 'yellow';
                setTimeout(() => { statusText.textContent = 'ESPERANDO ÓRDENES...'; statusText.style.color = '#ff6b6b'; }, 2000);
                return;
            }

            clearInterval(cicloInterval);
            zorroElement.classList.remove('look-left', 'look-right');
            triggerJelly(); 

            mascotBtn.classList.add('is-attacking');
            zorroElement.src = spritesZorro.atacando;
            statusText.textContent = '>> PREPARANDO CARGA...';
            statusText.style.color = '#450088'; 

            currentPayload = JSON.stringify({ 
                command: 'StartToques', 
                crns: crns, 
                asunto: asunto,
                medio: medio,
                tipo: tipo,
                resultado: resultado,
                descripcion: descripcion
            });

            setTimeout(() => {
                mascotBtn.classList.remove('is-attacking');
                zorroElement.src = spritesZorro.normal; 
                statusText.textContent = 'ESPERANDO CONFIRMACIÓN';
                statusText.style.color = '#60a5fa'; 
                
                showModal(`
                    <span style="color:#b533ff;">ASUNTO:</span> ${asunto}<br>
                    <span style="color:#b533ff;">CONFIGURACIÓN:</span> [${medio}] - [${tipo}] - [${resultado}]<br>
                    <span style="color:#b533ff;">CRNs A PROCESAR:</span> ${crns.split('\n').length} encontrados.<br>
                `);
            }, 1000);
        }

        function confirmarAtaque() {
            closeModal();
            const statusText = document.getElementById('status-text');
            
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(currentPayload);
            }

            statusText.textContent = '¡ÓRDENES ENVIADAS AL NÚCLEO!';
            statusText.style.color = '#4ade80'; 
            
            setTimeout(() => {
                statusText.textContent = 'ESPERANDO ÓRDENES...';
                statusText.style.color = '#ff6b6b';
                iniciarCicloDeVida(); 
            }, 3000);
        }

        function cancelarAtaque() {
            closeModal();
            currentPayload = null; 
            const statusText = document.getElementById('status-text');
            
            statusText.textContent = 'OPERACIÓN CANCELADA';
            statusText.style.color = 'yellow';
            
            setTimeout(() => {
                statusText.textContent = 'ESPERANDO ÓRDENES...';
                statusText.style.color = '#ff6b6b';
                iniciarCicloDeVida(); 
            }, 3000);
        }
    </script>
</body>
</html>
